<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 내신 대비 학습지 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 영어 내신 대비 학습지 생성기</h1>
            <p>AI 기반 분석서 + 워크북 자동 생성 시스템</p>
        </header>

        <!-- API 설정 섹션 -->
        <section class="config-section">
            <h2>🔧 API 설정</h2>
            <div class="config-grid">
                <div class="input-group">
                    <label for="pageTitle">학습지 제목:</label>
                    <input type="text" id="pageTitle" />
                </div>
                <div class="input-group">
                    <label for="apiKey">OpenAI API 키:</label>
                    <input type="password" id="apiKey" placeholder="sk-..." />
                </div>
                <!-- <div class="input-group">
                    <label for="model">모델 선택:</label>
<select id="model">
    <option value="gpt-4o-mini">GPT-4o Mini (저렴, 128k)</option>
    <option value="gpt-4o">GPT-4o (최신, 128k)</option>
    <option value="gpt-4-turbo">GPT-4 Turbo (128k)</option>
    <option value="gpt-4">GPT-4 (8k)</option>
    <option value="gpt-3.5-turbo">GPT-3.5 Turbo (16k)</option>
</select>
                </div> -->
            
            </div>
        </section>

        <!-- 개발 테스트: 샘플 PDF -->
        <section style="background:#F0FDF4; border:1px solid #86EFAC; border-radius:8px; padding:14px 18px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; gap:16px;">
            <div>
                <strong style="color:#166534; font-size:13px;">🧪 PDF 레이아웃 테스트</strong>
                <p style="color:#4B7A5B; font-size:11px; margin:3px 0 0;">AI 없이 샘플 데이터로 PDF 생성 — 토큰 소모 없음</p>
            </div>
            <button onclick="downloadSamplePDF()" style="background:#16A34A; color:#fff; border:none; border-radius:6px; padding:8px 18px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap;">샘플 PDF 다운로드</button>
        </section>

<!--
        설정 섹션 아래에 추가
<section class="dev-mode-section" style="background:#FFF3CD; padding:15px; border-radius:8px; margin-bottom:20px;">
    <h3 style="color:#856404; margin-bottom:10px;">🔧 개발 모드</h3>
    <div style="display:flex; gap:10px;">
<button id="saveJson" class="select-btn">💾 JSON 저장</button>

        <input type="file" id="jsonFileInput" accept=".json" style="display:none;">
    </div>
</section> -->

        <!-- 지문 입력 섹션 -->
        <section class="passage-section">
            <h2>📝 지문 입력</h2>
            <div class="passage-counter">
                <span id="passageCount">현재 지문 수: 0/5</span>
            </div>
            <textarea 
                id="passageInput" 
                placeholder="영어 지문을 입력하세요. 여러 지문은 --- (하이픈 3개 이상)로 구분해주세요.

예시:
Children today are 'safe.' Their only worries consist of fights with their parents, going to school, and dealing with the list of activities that they're signed up for. But what's going on? If they're 'safe' and living 'well,' why do they experience so many problems?

-----

Technology has revolutionized the way we communicate and interact with the world around us...

-----

Environmental protection is becoming increasingly important..."
                rows="15"
            ></textarea>
            <div class="help-text">
                💡 지문 구분은 --- (하이픈 3개 이상)로 해주세요. 최대 5개 지문까지 처리 가능합니다.
            </div>
        </section>

        <!-- 학습지 유형 선택 -->
<section class="types-section">
    <h2>📋 학습지 유형 선택</h2>

    <div class="category">
        <div class="types-grid">
            <label class="type-checkbox">
                <input type="checkbox" id="기본워크북" checked>
                <span>기본 워크북</span>
                <small>본문노트 · 문장해석 · 핵심어휘 · 한줄해석</small>
            </label>
            <label class="type-checkbox">
                <input type="checkbox" id="문제워크북" checked>
                <span>문제 워크북</span>
                <small>어법선택 · 어휘선택 · 삽입 · 순서 · 빈칸(단어) · 빈칸(문장) · 요약</small>
            </label>
            <label class="type-checkbox">
                <input type="checkbox" id="분석서" checked>
                <span>분석서</span>
                <small>요약 · 구문분석 · 청킹 · 단어 · 어법 POINT</small>
            </label>
        </div>
    </div>

    <!-- 전체 선택/해제 버튼 -->
    <div class="select-all-section">
        <button id="selectAllTypes" class="select-btn">전체 선택/해제</button>
    </div>
</section>

        <!-- 생성 버튼 -->
        <section class="generate-section">
            <button id="generateBtn" class="generate-btn">
                🚀 학습지 생성하기
            </button>
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>AI가 학습지를 생성하고 있습니다...</p>
                <div id="progressInfo" class="progress-info"></div>
            </div>
        </section>

                <!-- 결과 섹션 -->
        <section class="result-section" id="resultSection">
            <h2>📄 생성된 학습지</h2>
            <div class="result-actions">
                <button id="downloadPdf" class="pdf-btn">PDF 다운로드</button>
                <button id="downloadHtml" class="preview-btn">  HTML 다운로드  </button>
            </div>
            <div id="generationSummary" class="generation-summary"></div>
        </section>
<!-- 
        결과 섹션 위에 추가 -->

    </div>
    <div id="historyList" class="history-list"></div>

        <!-- 미리보기 모달 -->
        <div id="previewModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>📄 학습지 미리보기</h3>
                    <button id="closeModal" class="close-btn">&times;</button>
                </div>
                <div id="previewContent" class="preview-content"></div>
            </div>
        </div>
    </div>

    <script src="script.js?v=20260330b"></script>
</body>
</html><!-- build trigger -->
